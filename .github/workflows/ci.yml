name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore FeedbackLoop.sln
      - run: dotnet build FeedbackLoop.sln --configuration Release --no-restore
      - run: dotnet test FeedbackLoop.sln --configuration Release --no-build /p:CollectCoverage=true /p:Threshold=60 /p:ThresholdType=line /p:CoverletOutputFormat=opencover

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: feedbackloop-app/package-lock.json
      - run: cd feedbackloop-app && npm ci && npm run test && npm run build

  widget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: feedbackloop-widget/package-lock.json
      - run: cd feedbackloop-widget && npm ci && npm run test && npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [api, app, widget]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build postgres api app
      - name: Wait for API health check
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:5000/health; then
              exit 0
            fi
            docker compose ps
            sleep 2
          done

          docker compose logs api
          exit 1
      - name: Check app container
        run: curl --fail --silent http://localhost:3000 > /dev/null
      - if: always()
        run: docker compose down -v
