name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore FeedbackLoop.sln
      - run: dotnet build FeedbackLoop.sln --no-restore
      - run: dotnet test FeedbackLoop.sln --no-build

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: feedbackloop-app/package-lock.json
      - run: cd feedbackloop-app && npm ci && npm run test && npm run build

  widget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: feedbackloop-widget/package-lock.json
      - run: cd feedbackloop-widget && npm ci && npm run test && npm run build
