<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeedbackLoop Widget Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Produto do cliente simulado</h1>
      <p>Este HTML carrega o bundle UMD gerado em <code>dist/widget.umd.js</code>.</p>
    </main>
    <script src="./dist/widget.umd.js"></script>
    <script>
      FeedbackLoop.init({
        boardSlug: "teste",
        endUserToken: crypto.randomUUID(),
        endUserName: "Usuario Teste",
        apiBaseUrl: "http://localhost:5000",
        position: "bottom-right",
        theme: "auto"
      });
    </script>
  </body>
</html>
